<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Bacha Deluxe</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

header{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.hero{
padding:35px 20px;
text-align:center;
}

.hero h1{
font-size:30px;
margin-bottom:8px;
}

.hero p{
opacity:0.8;
}

.card{
background:#1e293b;
margin:20px auto;
padding:15px;
border-radius:16px;
max-width:420px;
box-shadow:0 0 18px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.08);
}

.card img{
width:100%;
border-radius:12px;
}

.card h2{
margin-top:10px;
font-size:22px;
}

.desc{
opacity:0.75;
font-size:14px;
margin:5px 0 10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#2563eb;
transform:scale(1.02);
}

footer{
text-align:center;
padding:20px;
opacity:0.6;
font-size:13px;
margin-top:20px;
}

@media(min-width:768px){
.card{
max-width:500px;
}
}
</style>

</head>

<body>

<header>
🛁 Tienda Bacha Deluxe
</header>

<div class="hero">
<h1>Diseño premium para tu baño 💎</h1>
<p>Calidad alta • Estilo moderno • Envíos rápidos</p>
</div>

<div class="card">
<img src="bacha1.jpg" alt="Bacha Deluxe">

<h2>💎 Bacha Deluxe Premium</h2>

<p class="desc">
Bacha de diseño moderno, ideal para baños elegantes y minimalistas.
Material resistente y acabado premium.
</p>

<button>Comprar ahora</button>
</div>

<footer>
© 2026 Tienda Bacha Deluxe - Todos los derechos reservados
</footer>

</body>
</html>
