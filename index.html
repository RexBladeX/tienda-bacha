<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bachas Capibara - Tienda Premium</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#0f172a,#0b1220);
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
position:sticky;
top:0;
z-index:100;
}

.menu{
font-size:28px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100%;
background:rgba(17,24,39,0.95);
backdrop-filter:blur(10px);
padding-top:60px;
transition:.3s;
z-index:1000;
}

.sidebar.active{
left:0;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,.1);
}

.sidebar a:hover{
background:#1f2937;
}

.social-box{
padding:10px;
border-top:1px solid rgba(255,255,255,.15);
}

.social-box a{
display:block;
padding:12px;
margin-top:10px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

.ig{
background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);
}

.wa{
background:#22c55e;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
}

.overlay.active{
display:block;
}

/* BANNER */
.banner{
display:flex;
justify-content:center;
padding:10px;
}

.banner img{
width:100%;
max-width:520px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* TITULO */
.titulo{
text-align:center;
padding:20px;
}

.titulo h1{
font-size:34px;
}

.titulo p{
opacity:.8;
margin-top:5px;
}

/* SECCIONES */
.section{
padding:10px;
}

/* CARD PRO */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.08);
max-width:450px;
margin:20px auto;
padding:15px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:12px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#3b82f6,#06b6d4);
color:white;
font-size:16px;
margin-top:10px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

/* VIDEO */
video{
width:100%;
border-radius:12px;
}

/* FOOTER */
footer{
text-align:center;
padding:25px;
opacity:.7;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<a href="#" onclick="mostrar('bachas')">🛁 Bachas</a>
<a href="#" onclick="mostrar('mesadas')">🪨 Mesadas</a>
<a href="#" onclick="mostrar('extras')">🎥 Extras</a>

<div class="social-box">

<a class="ig" href="https://www.instagram.com/bachascapibara" target="_blank">
📸 Instagram
</a>

<a class="wa" href="https://wa.me/5493794576553" target="_blank">
💬 WhatsApp
</a>

</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- HEADER -->
<header>
<div class="menu" onclick="toggleMenu()">☰</div>
<div><strong>Bachas Capibara</strong></div>
<div>bacha capibara</div>
</header>

<!-- BANNER -->
<div class="banner">
<img src="bacha.jpg">
</div>

<!-- TITULO -->
<div class="titulo">
<h1>Bachas Capibara</h1>
<p>Bachas y mesadas de calidad premium para baños modernos</p>
</div>

<!-- BACHAS -->
<div id="bachas" class="section">

<div class="card">
<img src="bacha1.jpg">
<h2> Bacha Deluxe</h2>
<p>Diseño moderno y elegante.</p>
<button onclick="window.open('https://wa.me/5493794576553')">
Comprar
</button>
</div>

</div>

<!-- MESADAS -->
<div id="mesadas" class="section" style="display:none;">

<div class="card">
<img src="mesada.jpg">
<h2> Mesada</h2>
<p>Resistente y elegante.</p>
<button onclick="window.open('https://wa.me/5493794576553')">
Comprar
</button>
</div>
</div>

<!-- EXTRAS -->
<div id="extras" class="section" style="display:none;">

<div class="card">
<h2>Mira nuestros videos promocionales</h2>
<video controls>
<source src="video.mp4" type="video/mp4">
</video>
</div>

<div class="card">
<video controls>
<source src="videopromocional2.mp4" type="video/mp4">
</video>
</div>

</div>

<footer>
© 2026 Bachas Capibara
</footer>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

function mostrar(seccion){
document.getElementById("bachas").style.display="none";
document.getElementById("mesadas").style.display="none";
document.getElementById("extras").style.display="none";

document.getElementById(seccion).style.display="block";

toggleMenu();
}
</script>

</body>
</html>
