<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Bacha Deluxe</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
font-size:18px;
font-weight:bold;
}

/* MENU */
.menu{
font-size:26px;
cursor:pointer;
user-select:none;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100%;
background:#111827;
padding-top:60px;
transition:0.3s ease;
z-index:1000;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* SOCIAL EN SIDEBAR */
.sidebar .social-box{
margin-top:10px;
padding:10px;
border-top:1px solid rgba(255,255,255,0.2);
}

.social-box a{
display:block;
margin-top:10px;
padding:10px;
border-radius:8px;
text-align:center;
font-weight:bold;
text-decoration:none;
color:white;
}

.ig{
background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
}

.wa{
background:#22c55e;
}

/* ACTIVE */
.sidebar.active{
left:0;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:900;
}

.overlay.active{
display:block;
}

/* BANNER */
.banner img{
width:100%;
height:230px;
object-fit:cover;
display:block;
}

/* HERO */
.hero{
text-align:center;
padding:10px 20px;
opacity:0.85;
}

/* CARD */
.card{
background:#1e293b;
margin:20px auto;
padding:15px;
border-radius:16px;
max-width:420px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 18px rgba(0,0,0,0.4);
}

.card img{
width:100%;
border-radius:12px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
transform:scale(1.02);
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<a href="#" onclick="show('bachas')">🛁 Bachas</a>
<a href="#" onclick="show('mesadas')">🪨 Mesadas</a>

<!-- REDES EN SIDEBAR -->
<div class="social-box">

<a class="ig" href="https://www.instagram.com/bachascapibara" target="_blank">
📸 Instagram
</a>

<a class="wa" href="https://wa.me/5493794576553" target="_blank">
💬 WhatsApp
</a>

</div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggle()"></div>

<!-- HEADER -->
<header>
<div class="menu" onclick="toggle()">☰</div>

🛁 Tienda Deluxe

<div style="font-size:12px;opacity:0.8;">PRO</div>
</header>

<!-- BANNER -->
<div class="banner">
<img src="bacha.jpg" alt="Banner">
</div>

<!-- BACHAS -->
<div id="bachas">

<div class="hero">Bachas premium 💎</div>

<div class="card">
<img src="bacha1.jpg">
<h2>💎 Bacha Deluxe</h2>

<button onclick="window.open('https://wa.me/5493794576553','_blank')">
Comprar
</button>
</div>

</div>

<!-- MESADAS -->
<div id="mesadas" style="display:none">

<div class="hero">Mesadas modernas 🪨</div>

<div class="card">
<img src="mesada.jpg">
<h2>🪨 Mesada Premium</h2>

<button onclick="window.open('https://wa.me/5493794576553','_blank')">
Comprar
</button>
</div>

</div>

<script>
function toggle(){
document.getElementById("sidebar").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

function show(section){
document.getElementById("bachas").style.display = section === "bachas" ? "block" : "none";
document.getElementById("mesadas").style.display = section === "mesadas" ? "block" : "none";
toggle();
}
</script>

</body>
</html>
