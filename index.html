<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Bacha Deluxe</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
font-size:18px;
font-weight:bold;
}

/* MENU BUTTON */
.menu-btn{
font-size:26px;
cursor:pointer;
user-select:none;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-250px;
width:220px;
height:100%;
background:#111827;
padding-top:60px;
transition:0.3s;
box-shadow:2px 0 10px rgba(0,0,0,0.5);
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.sidebar a:hover{
background:#1f2937;
}

/* ACTIVE MENU */
.sidebar.active{
left:0;
}

/* SECTIONS */
.section{
display:none;
padding:20px;
}

.section.active{
display:block;
}

/* CARD */
.card{
background:#1e293b;
margin:20px auto;
padding:15px;
border-radius:16px;
max-width:420px;
border:1px solid rgba(255,255,255,0.08);
}

.card img{
width:100%;
border-radius:12px;
}

.card h2{
margin-top:10px;
font-size:22px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

/* HERO */
.hero{
text-align:center;
padding:15px;
opacity:0.8;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
🛁 Tienda Deluxe
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a href="#" onclick="showSection('bachas')">🛁 Bachas</a>
<a href="#" onclick="showSection('mesadas')">🪨 Mesadas</a>
</div>

<!-- BACHAS -->
<div id="bachas" class="section active">

<div class="hero">Bachas premium 💎</div>

<div class="card">
<img src="bacha.jpg" alt="Bacha">
<h2>💎 Bacha Deluxe</h2>
<button onclick="window.open('https://wa.me/5493794576553','_blank')">
Comprar
</button>
</div>

</div>

<!-- MESADAS -->
<div id="mesadas" class="section">

<div class="hero">Mesadas modernas 🪨</div>

<div class="card">
<img src="mesada.jpg" alt="Mesada">
<h2>🪨 Mesada Premium</h2>
<button onclick="window.open('https://wa.me/5493794576553','_blank')">
Comprar
</button>
</div>

</div>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

function showSection(id){
document.getElementById("bachas").classList.remove("active");
document.getElementById("mesadas").classList.remove("active");

document.getElementById(id).classList.add("active");
document.getElementById("sidebar").classList.remove("active");
}
</script>

</body>
</html>
