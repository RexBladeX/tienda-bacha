<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Bacha</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

/* HEADER */
header{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

/* HERO */
.hero{
padding:40px 20px;
text-align:center;
}

.hero h1{
font-size:32px;
margin-bottom:10px;
}

.hero p{
opacity:0.8;
}

/* PRODUCTO */
.card{
background:#1e293b;
margin:20px;
padding:15px;
border-radius:15px;
max-width:400px;
margin-left:auto;
margin-right:auto;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.card img{
width:100%;
border-radius:12px;
}

.price{
color:#22c55e;
font-size:20px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
opacity:0.6;
font-size:14px;
}

@media(min-width:768px){
.card{
max-width:500px;
}
}
</style>

</head>

<body>

<header>
🛁 Tienda Bacha Premium
</header>

<div class="hero">
<h1>Bachas modernas para tu baño</h1>
<p>Calidad premium • Diseño elegante • Envíos rápidos</p>
</div>

<div class="card">
<img src="bacha1.jpg" alt="Bacha">
<h2>Bacha Moderna Cristal</h2>
<p class="price">$45.000 ARS</p>
<button>Comprar ahora</button>
</div>

<footer>
© 2026 Tienda Bacha - Todos los derechos reservados
</footer>

</body>
</html>
