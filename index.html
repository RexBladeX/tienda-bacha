<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bachas Capibara - Bachas y Mesadas Premium</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
font-size:20px;
font-weight:bold;
position:sticky;
top:0;
z-index:100;
}

.menu{
font-size:28px;
cursor:pointer;
user-select:none;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100%;
background:#111827;
padding-top:60px;
transition:.3s;
z-index:1000;
}

.sidebar.active{
left:0;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,.1);
}

.sidebar a:hover{
background:#1f2937;
}

.social-box{
padding:10px;
margin-top:10px;
border-top:1px solid rgba(255,255,255,.15);
}

.social-box a{
display:block;
text-align:center;
padding:12px;
margin-top:10px;
border-radius:10px;
font-weight:bold;
}

.ig{
background:linear-gradient(
45deg,
#f09433,
#e6683c,
#dc2743,
#cc2366,
#bc1888
);
}

.wa{
background:#22c55e;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
z-index:900;
}

.overlay.active{
display:block;
}

/* BANNER */
.banner{
display:flex;
justify-content:center;
padding:10px;
}

.banner img{
width:100%;
max-width:500px;
height:auto;
border-radius:12px;
}

/* TITULO */
.titulo{
text-align:center;
padding:20px;
}

.titulo h1{
font-size:34px;
margin-bottom:8px;
}

.titulo p{
opacity:.8;
font-size:16px;
}

/* SECCIONES */
.section{
padding:10px;
}

/* CARD */
.card{
background:#1e293b;
max-width:420px;
margin:20px auto;
padding:15px;
border-radius:16px;
box-shadow:0 0 18px rgba(0,0,0,.4);
}

.card img{
width:100%;
border-radius:12px;
}

.card h2{
margin-top:12px;
margin-bottom:10px;
}

.card p{
opacity:.8;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

footer{
text-align:center;
padding:25px;
opacity:.7;
font-size:14px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<a href="#" onclick="mostrar('bachas')">
🛁 Bachas
</a>

<a href="#" onclick="mostrar('mesadas')">
🪨 Mesadas
</a>

<div class="social-box">

<a class="ig"
href="https://www.instagram.com/bachascapibara"
target="_blank">
📸 Instagram
</a>

<a class="wa"
href="https://wa.me/5493794576553"
target="_blank">
💬 WhatsApp
</a>

</div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- HEADER -->
<header>

<div class="menu" onclick="toggleMenu()">
☰
</div>

<div>
Bachas Capibara
</div>

<div>
💎
</div>

</header>

<!-- BANNER -->
<div class="banner">
<img src="bacha.jpg" alt="Banner Bachas Capibara">
</div>

<!-- TITULO -->
<div class="titulo">
<h1>Bachas Capibara</h1>
<p>Bachas y mesadas premium para baños modernos</p>
</div>

<!-- BACHAS -->
<div id="bachas" class="section">

<div class="card">

<img src="bacha1.jpg" alt="Bacha Deluxe">

<h2>🛁 Bacha Deluxe</h2>

<p>
Diseño elegante y moderno para baños premium.
</p>

<button onclick="window.open('https://wa.me/5493794576553','_blank')">
Comprar por WhatsApp
</button>

</div>

</div>

<!-- MESADAS -->
<div id="mesadas" class="section" style="display:none;">

<p>
Mesada resistente y elegante para complementar tu baño.
</p>

<button onclick="window.open('https://wa.me/5493794576553','_blank')">
Comprar por WhatsApp
</button>

</div>

</div>

<footer>
© 2026 Bachas Capibara
</footer>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

function mostrar(seccion){

document.getElementById("bachas").style.display="none";
document.getElementById("mesadas").style.display="none";

document.getElementById(seccion).style.display="block";

toggleMenu();
}
</script>

</body>
</html>
