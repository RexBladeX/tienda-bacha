<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Bacha Deluxe</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
font-size:18px;
font-weight:bold;
}

/* SOCIAL */
.social{
display:flex;
gap:8px;
}

.social a{
text-decoration:none;
padding:8px 12px;
border-radius:8px;
color:white;
font-size:13px;
font-weight:bold;
}

.ig{
background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
}

.wa{
background:#22c55e;
}

/* BANNER */
.banner img{
width:100%;
height:230px;
object-fit:cover;
display:block;
}

/* HERO */
.hero{
text-align:center;
padding:10px 20px;
opacity:0.85;
}

/* CARD */
.card{
background:#1e293b;
margin:20px auto;
padding:15px;
border-radius:16px;
max-width:420px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 18px rgba(0,0,0,0.4);
}

.card img{
width:100%;
border-radius:12px;
}

.card h2{
margin-top:10px;
font-size:22px;
}

.desc{
opacity:0.75;
font-size:14px;
margin:8px 0 12px;
}

/* BOTÓN */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#2563eb;
transform:scale(1.02);
}

footer{
text-align:center;
padding:20px;
opacity:0.6;
font-size:13px;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
🛁 Tienda Bacha Deluxe

<div class="social">
<a class="ig" href="https://www.instagram.com/bachascapibara" target="_blank" rel="noopener">
📸 IG
</a>

<a class="wa" href="https://wa.me/5493794576553" target="_blank" rel="noopener">
💬 WA
</a>
</div>
</header>

<!-- BANNER -->
<div class="banner">
<img src="bacha.jpg" alt="Banner Bacha">
</div>

<!-- HERO -->
<div class="hero">
Diseño premium para baños modernos 💎
</div>

<!-- PRODUCTO -->
<div class="card">

<img src="bacha1.jpg" alt="Bacha Deluxe">

<h2>💎 Bacha Deluxe</h2>

<p class="desc">
Bacha moderna, elegante y resistente. Ideal para baños premium.
</p>

<button onclick="window.open('https://wa.me/5493794576553','_blank')">
Comprar ahora
</button>

</div>

<footer>
© 2026 Tienda Bacha Deluxe
</footer>

</body>
</html>
